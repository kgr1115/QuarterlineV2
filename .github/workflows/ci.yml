name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Typecheck, build, and smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (main process)
        run: npx tsc --noEmit -p tsconfig.node.json

      - name: Typecheck (renderer)
        run: npx tsc --noEmit -p tsconfig.web.json

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Smoke test (Electron data layer)
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" npm run smoke-test
