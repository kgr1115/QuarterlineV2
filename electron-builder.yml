appId: com.quarterline.v2
productName: QuarterlineV2
copyright: Copyright (c) 2026 Kyle Rauch
artifactName: QuarterlineV2-Setup-${version}-${arch}.${ext}
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
  - "!node_modules/**/*"
asarUnpack:
  - "**/*.node"
win:
  target:
    - target: nsis
      arch:
        - x64
  signAndEditExecutable: false
forceCodeSigning: false
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  shortcutName: QuarterlineV2
  uninstallDisplayName: QuarterlineV2 ${version}
  createDesktopShortcut: true
  createStartMenuShortcut: true

# Auto-update publish provider. Uncomment and adjust when a release
# pipeline is configured. Without this, electron-updater logs a
# "no publish config" error on startup (caught and written to
# ~/.quarterline/logs/crash.log) — the app continues to run normally.
# publish:
#   provider: github
#   owner: kgrau
#   repo: QuarterlineV2
