appId: com.quarterline.v2
productName: QuarterlineV2
copyright: Copyright (c) 2026 Kyle Rauch
artifactName: QuarterlineV2-Setup-${version}-${arch}.${ext}
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
  - "!node_modules/**/*"
asarUnpack:
  - "**/*.node"
win:
  target:
    - target: nsis
      arch:
        - x64
  signAndEditExecutable: false
forceCodeSigning: false
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  shortcutName: QuarterlineV2
  uninstallDisplayName: QuarterlineV2 ${version}
  createDesktopShortcut: true
  createStartMenuShortcut: true

# Auto-update publish provider. Pointed at the public GitHub repo;
# electron-updater downloads from /releases/latest. To publish a
# release, run `npm run package -- --publish always` (requires the
# GH_TOKEN env var set to a token with `repo` scope) or push a
# tagged release manually.
publish:
  provider: github
  owner: kgr1115
  repo: QuarterlineV2
