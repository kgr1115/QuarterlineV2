appId: com.quarterline.v2
productName: QuarterlineV2
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
  - "!node_modules/**/*"
asarUnpack:
  - "**/*.node"
win:
  target:
    - target: nsis
      arch:
        - x64
  signAndEditExecutable: false
forceCodeSigning: false
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
